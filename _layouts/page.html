---
layout: default
---
{% if page.banner %}
<div class="banner" style="background-image: url('{{ site.baseurl }}/assets/{{ page.banner }}');">
  <div class="banner-overlay">
    <h1 class="banner-title">{{ page.title }}</h1>
  </div>
</div>
{% else %}
<div class="page-header"><h1>{{ page.title }}</h1></div>
{% endif %}
<article class="page-content">{{ content }}</article>
